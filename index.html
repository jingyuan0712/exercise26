<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise Image</title>

<style>
body{
    padding: 40px;
    background-color: #f2f2f2;
}

/* ⭐ 重點：整排固定寬度 */
.container{
    width: 800px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 左圖（正常比例） */
.img-left{
    width: 250px;
    height: auto;
    border-radius: 18px;
}

/* 中間（圓形） */
.img-center{
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #ccc;
}

/* 右圖（變形） */
.img-right{
    width: 250px;
    height: 300px;
    object-fit: fill;
}
</style>

</head>

<body>

<div class="container">

<img src="your1.jpg" class="img-left">

<img src="your2.jpg" class="img-center">

<img src="your3.jpg" class="img-right">

</div>

</body>
</html>
